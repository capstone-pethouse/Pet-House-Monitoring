spring.application.name=pet-house-monitoring

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pet_house_db?serverTimezone=Asia/Seoul&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.servlet.context-path=/api

spring.jpa.properties.hibernate.default_batch_size=100
spring.datasource.hikari.initialization-fail-timeout=60000

# JWT
jwt.secret=${JWT_SECRET:dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtYXQtbGVhc3QtMzItYnl0ZXMtbG9uZyEh}
jwt.access-token-expiry=1800000
jwt.refresh-token-expiry=1209600000